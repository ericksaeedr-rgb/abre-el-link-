<body>

<div class="card">

```
<div class="heart-top">❤️</div>

<h1>¿Quieres ser mi novia?</h1>

<p class="subtitle">
    Tengo una pregunta muy importante para ti... 🥺
</p>

<div class="buttons">
    <button id="yesBtn">Sí ❤️</button>
    <button id="noBtn">No 😔</button>
</div>

<div id="message">
    <h2>¡Me acabas de hacer la persona más feliz del mundo! ❤️</h2>
    <p>
        Gracias por aceptar. Prometo darte muchos momentos bonitos ✨
    </p>
</div>
```

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const message = document.getElementById("message");

function moveButton(){

    const container = document.querySelector(".buttons");

    const maxX = container.offsetWidth - noBtn.offsetWidth;
    const maxY = 10;

    const x = Math.random() * Math.max(maxX, 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = maxY + "px";
}
}

document.addEventListener("mousemove",(e)=>{

    const rect = noBtn.getBoundingClientRect();

    const centerX = rect.left + rect.width/2;
    const centerY = rect.top + rect.height/2;

    const distance = Math.hypot(
        e.clientX-centerX,
        e.clientY-centerY
    );

    if(distance < 100){
        moveButton();
    }
});

noBtn.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    moveButton();
});

noBtn.addEventListener("click",(e)=>{
    e.preventDefault();
    moveButton();
});

yesBtn.addEventListener("click",()=>{

    document.querySelector(".buttons").style.display = "none";

    message.style.display = "block";

    for(let i=0;i<30;i++){

        const heart=document.createElement("div");

        heart.classList.add("heart");
        heart.innerHTML="❤️";

        heart.style.left=Math.random()*window.innerWidth+"px";
        heart.style.top=window.innerHeight+"px";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },3000);
    }
});

</script>

</body>
</html>
